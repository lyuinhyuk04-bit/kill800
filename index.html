<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>배그 킬내기 오버레이 (다중 모드)</title>
    <!-- 방송에서 깔끔하게 보이는 폰트 -->
    <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-layout">
        <!-- 💡 OBS에 띄울 오버레이 영역들 (여러 개가 나올 수 있음) -->
        <div id="overlays-wrapper">
            <!-- 자바스크립트에 의해 여러 개의 팀 오버레이 표가 자동으로 생성됩니다 -->
        </div>

        <!-- 💡 조작 및 설정 패널 (스트리머 조작용) -->
        <div class="controls">
            <h3>⚙️ 킬내기 팀(표) 다중 설정 관리</h3>
            <p class="desc">선수 닉네임과 수동 플러스/마이너스 점수를 세팅하세요. 닉네임을 적지 않으면 숨겨집니다.</p>
            
            <button id="add-team-btn" class="btn primary" style="margin-bottom: 15px;">➕ 팀(표) 추가하기</button>
            
            <div id="team-controls-wrapper">
                <!-- 자바스크립트로 팀 설정 창들이 쭈욱 생성됩니다 -->
            </div>
            
            <div class="divider"></div>
            
            <h3>🎮 라운드(판)별 킬수 일괄 관리</h3>
            <p class="desc">매 판(라운드)이 끝날 때마다 아래 버튼을 눌러 라운드 박스를 추가하고 킬수를 입력하세요.</p>
            <button id="add-match-btn" class="btn primary" style="background:#8b5cf6; margin-bottom: 15px;">➕ 판(라운드) 추가하기</button>
            <div id="matches-wrapper">
                <!-- 자바스크립트로 판별 입력 패널이 생성됩니다 -->
            </div>
            
            <div class="divider"></div>
            
            <button id="save-all-btn" class="btn primary" style="background:#238636; margin-bottom: 15px;">초기화 및 새 게임 시작 (기록 싹 지우기)</button>
            
            <!-- 버튼명 변경 적용 -->
            <button id="test-btn" class="btn secondary">랜덤 계산 테스트</button>

            <!-- 💡 수동 테스트 (계산 결과 시뮬레이션 패널) -->
            <div class="manual-test-box">
                <h4 style="margin-bottom: 8px;">🧪 수동 계산 시뮬레이터</h4>
                <p style="font-size: 11px; color:#8b949e; margin-bottom: 10px; line-height: 1.4;">
                    위플랩 계산 결과값(+3, -2 등)이 들어오는 방식을 똑같이 흉내내 봅니다. (위플랩 전송값)
                </p>
                <div class="manual-inputs">
                    <input type="text" id="manual-nick" class="p-name-input manual-input" placeholder="테스트할 닉네임">
                    <input type="text" id="manual-val" class="p-name-input manual-input kill-num" placeholder="결과 (+3, -1 등)" value="+3">
                </div>
                <button id="manual-test-btn" class="btn manual-btn">계산값 추가</button>
            </div>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
